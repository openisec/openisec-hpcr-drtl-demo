services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: password
      POSTGRES_DB: openisec
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d openisec"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
    ports:
      - "8000:8080"
    environment:
      - DATABASE_URL=postgresql+psycopg2://appuser:password@db:5432/openisec
      - SECRET_KEY=${SECRET_KEY:-change-this-to-a-random-secret-key}
      - DEBUG=true
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=gemini-2.5-flash
      - PORT=8080
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./apps/web
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      api:
        condition: service_healthy

  migrate:
    build:
      context: ./apps/api
    command: ["python", "-m", "alembic", "upgrade", "head"]
    environment:
      - DATABASE_URL=postgresql+psycopg2://appuser:password@db:5432/openisec
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

volumes:
  postgres_data: